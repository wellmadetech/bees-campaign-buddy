databases:
  - name: campaign-buddy-db
    plan: free
    databaseName: campaign_buddy
    user: buddy

services:
  - type: web
    name: campaign-buddy
    runtime: node
    plan: free
    buildCommand: npm run render:build
    startCommand: npm run render:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: campaign-buddy-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "15m"
      - key: BRAZE_API_KEY
        value: "placeholder-set-in-dashboard"
      - key: BRAZE_REST_ENDPOINT
        value: "https://rest.iad-01.braze.com"
      - key: BRAZE_WEBHOOK_SECRET
        generateValue: true
